<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Game Club Shelf</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet">
    
    <style>
        /* --- LIVING ROOM BACKGROUND ENVIRONMENT --- */
        body {
            margin: 0;
            padding: 40px 20px 0 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: white;
            min-height: 100vh;
            box-sizing: border-box;
            
            /* Cozy 70s/80s striped retro living room wallpaper */
            background: repeating-linear-gradient(
                90deg,
                #231d1a,
                #231d1a 40px,
                #2d2521 40px,
                #2d2521 80px
            );
            position: relative;
        }

        /* Ambient Room Shadowing & Heightened Wooden Base Floorboards */
        body::after {
            content: "";
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 240px; 
            background: #402611; /* Rich wood floorboard texture */
            border-top: 16px solid #2b190b; /* Baseboard trim */
            z-index: 0;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.6);
        }

        /* Vignette gradient for dimly lit room glow */
        .room-dimmer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 2; 
            display: grid;
            grid-template-columns: 1fr;
            justify-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 26px;
            color: #f7d51d;
            text-shadow: 4px 4px #000;
        }

        /* --- STAGE LAYOUT WRAPPER --- */
        .living-room-stage {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 40px;
            width: 100%;
            position: relative;
            padding-bottom: 90px; 
        }

        /* --- FURNITURE CABINET --- */
        .entertainment-unit {
            background-color: #6E4724; 
            border: 8px solid #000;
            padding: 20px;
            box-shadow: 0 15px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 650px;
            z-index: 3;
            position: relative;
        }

        .shelf-bay {
            background-color: #442812; border: 4px solid #000;
            padding: 25px 15px 0px 15px; display: flex; flex-wrap: wrap; gap: 20px;
            justify-content: center; min-height: 220px;
        }

        /* --- THE CRT TELEVISION SET --- */
        .retro-tv {
            background-color: #3e3e42;
            border: 8px solid #000;
            border-radius: 20px;
            padding: 22px;
            width: 100%;
            max-width: 580px; 
            margin: 0 auto; 
            position: relative;
            box-shadow: inset -10px -10px 0px #2d2d30, 0 10px 25px rgba(0,0,0,0.6);
            z-index: 5;
        }
        .tv-screen {
            background: linear-gradient(135deg, #0c2030 0%, #05101a 100%);
            border: 6px solid #1a1a1a;
            border-radius: 30px / 15px;
            padding: 20px;
            min-height: 270px; 
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }
        
        /* CRT Screen Grain Shader Elements */
        .tv-screen.static-active::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 3px, 6px 100%; opacity: 0.4;
        }
        .tv-screen.static-active::after {
            content: ""; position: absolute; top: -50%; left: -50%; right: -50%; bottom: -50%;
            background: transparent url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise" %3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E') repeat;
            opacity: 0.22; animation: tv-grain 0.2s infinite; z-index: 1;
        }
        @keyframes tv-grain {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-2%, 2%); }
            100% { transform: translate(0, 0); }
        }

        .tv-content { z-index: 3; display: none; height: 100%; }
        .tv-placeholder-text { z-index: 3; text-align: center; margin-top: 75px; color: #636e72; }
        .tv-screen h2 { font-size: 15px; color: #39ff14; text-shadow: 0 0 5px #39ff14; margin-bottom: 5px; }
        .tv-date-tag { font-size: 9px; color: #209cee; margin-bottom: 12px; text-transform: uppercase; }
        .tv-tabs { display: flex; gap: 10px; margin-bottom: 12px; }
        .tv-tab-btn { font-size: 9px !important; padding: 5px 10px !important; }
        .tv-display-window { background: rgba(0, 0, 0, 0.4); border: 2px dashed #39ff14; padding: 12px; min-height: 120px; max-height: 150px; overflow-y: auto; font-size: 11px; }
        .tv-display-window::-webkit-scrollbar { width: 8px; }
        .tv-display-window::-webkit-scrollbar-thumb { background: #39ff14; }
        .tv-member-review { border-bottom: 2px dashed #1a3a1a; padding-bottom: 10px; margin-bottom: 10px; }
        .tv-member-review:last-child { border-bottom: none; }
        .tv-member-header { display: flex; justify-content: space-between; align-items: center; color: #209cee; margin-bottom: 4px; }
        .stars { color: #f7d51d; font-size: 14px; letter-spacing: 2px; }
        .verdict-stars { font-size: 18px; color: #f7d51d; margin-bottom: 10px; }

        /* --- HARDWARE ARTIFACTS PLACED ON FLOOR --- */
        .floor-hardware-zone {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            position: absolute;
            bottom: 45px; 
            left: 140px;
            z-index: 4;
        }

        .game-console {
            background-color: #bdc3c7; border: 4px solid #000; width: 120px; height: 40px;
            position: relative; box-shadow: inset -4px -4px 0px #95a5a6, 5px 5px 0 rgba(0,0,0,0.4);
        }
        .console-power-led {
            position: absolute; top: 10px; left: 12px; width: 6px; height: 6px;
            background-color: #ff3838; box-shadow: 0 0 6px #ff3838; animation: led-blink 2s infinite ease-in-out;
        }
        @keyframes led-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .console-detail { border-top: 4px solid #000; margin-top: 22px; height: 5px; background: #7f8c8d; }

        .joystick-controller {
            width: 36px; height: 36px; background-color: #2f3542; border: 4px solid #000;
            position: relative; box-shadow: inset -3px -3px 0px #1e222b, 4px 4px 0 rgba(0,0,0,0.4);
        }
        .joystick-button { width: 6px; height: 6px; background-color: #ff4757; border: 2px solid #000; position: absolute; bottom: 4px; right: 4px; border-radius: 50%; }
        .joystick-stick { width: 4px; height: 16px; background-color: #747d8c; border: 2px solid #000; position: absolute; top: -10px; left: 12px; }
        .joystick-knob { width: 10px; height: 10px; background-color: #ff3838; border: 2px solid #000; border-radius: 50%; position: absolute; top: -18px; left: 9px; }

        /* --- THE GAMES --- */
        .game-case {
            width: 120px; height: 175px; background-size: cover; background-position: center;
            border: 4px solid #000; position: relative; cursor: pointer; transition: transform 0.2s;
            bottom: 0px; box-shadow: 4px 0px 0px rgba(0,0,0,0.4);
        }
        .game-case:hover { transform: translateY(-10px) scale(1.05); box-shadow: 5px 10px 0px rgba(0,0,0,0.5); z-index: 10; }
        .game-title-fallback { position: absolute; bottom: 0; background: rgba(0,0,0,0.85); width: 100%; font-size: 8px; text-align: center; padding: 4px 0; }
    </style>
</head>
<body>

<div class="room-dimmer"></div>

<div class="container">
    <header>
        <h1>THE GAME CLUB LOG</h1>
    </header>

    <div class="living-room-stage">
        
        <div class="floor-hardware-zone">
            <div class="game-console">
                <div class="console-power-led"></div>
                <div class="console-detail"></div>
            </div>
            
            <div class="joystick-controller">
                <div class="joystick-stick"></div>
                <div class="joystick-knob"></div>
                <div class="joystick-button"></div>
            </div>
        </div>

        <div class="entertainment-unit">
            
            <div class="retro-tv">
                <div class="tv-screen static-active" id="tvScreenBox">
                    
                    <div id="tvPlaceholder" class="tv-placeholder-text">
                        <h2>NOW PLAYING:</h2>
                        <p style="font-size: 10px;">[ INSERT A CARTRIDGE ]</p>
                    </div>

                    <div id="tvContentLayer" class="tv-content">
                        <h2 id="tvGameTitle">GAME TITLE</h2>
                        <div class="tv-date-tag" id="tvGameDate">PLAYED: N/A</div>
                        
                        <div class="tv-tabs">
                            <button type="button" class="nes-btn is-primary tv-tab-btn" onclick="switchTvTab('verdict')">VERDICT</button>
                            <button type="button" class="nes-btn is-success tv-tab-btn" onclick="switchTvTab('logs')">MEMBER LOGS</button>
                        </div>

                        <div class="tv-display-window" id="tvDisplayTerminal"></div>
                    </div>

                </div>
            </div>

            <div class="shelf-bay">
                <div class="game-case" style="background-image: url('https://upload.wikimedia.org/wikipedia/en/8/85/Tunic_cover_art.jpg');" onclick="loadGameToTv('tunic')">
                    <div class="game-title-fallback">Tunic</div>
                </div>

                <div class="game-case" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCNMOkaXu3XwgBR1O05-oyEXZJZtuk93-0UQ&s');" onclick="loadGameToTv('spiderman')">
                    <div class="game-title-fallback">Marvel's Spider-Man: Miles Morales</div>
                </div>

                <div class="game-case" style="background-image: url('https://upload.wikimedia.org/wikipedia/en/f/fc/Hi-Fi_Rush_cover_art.jpg');" onclick="loadGameToTv('HiFiRush')">
                    <div class="game-title-fallback">Hi-Fi Rush</div>
                </div>
            </div>

        </div> </div> </div>

<script>
    const clubReviews = {
        tunic: {
            title: "Tunic",
            datePlayed: "March 2026, nominated by Brian",
            overallStars: "★★★★★",
            verdictText: "An absolute masterclass in puzzle design and retro nostalgia. Exploring the manual together was an amazing milestone for the club.",
            memberComments: {
                Scott:  { stars: "★★★★☆", text: "Harder than I realized it would be but well worth the effort. This outing needs just a little more guidance in-game, but overall it delivers enough to keep you engaged." },
                Jared:  { stars: "★★★★☆", text: "REVIEW PENDING" },
                Spence: { stars: "★★★★★", text: "REVIEW PENDING" },
                Brian:  { stars: "★★★★☆", text: "An innovative, charming, and surpsingly difficult blast from the past. Its game manual-based guide, clever puzzles, and pleasing art style made this a joy to play—despite shallow combat and a footnote of a story." },
                Tim:    { stars: "★★★★☆", text: "REVIEW PENDING" },
                Justin: { stars: "★★★★★", text: "REVIEW PENDING" }
            }
        },
        spiderman: {
            title: "Marvel's Spider-Man: Miles Morales",
            datePlayed: "May 2026, nominated by Justin",
            overallStars: "★★★★☆",
            verdictText: "Short, sweet, and visually spectacular. The bio-electricity additions gave it a fantastic mechanical rhythm.",
            memberComments: {
                Scott:  { stars: "★★★☆☆", text: "Is there anything better than swinging through a snowy NYC as Spider-Man? Yes, but this game makes a good case for it. A little too YA with heavy-handed teamwork abound, but easy on the brain and a fun way to spend an afternoon." },
                Jared:  { stars: "★★★★☆", text: "REVIEW PENDING" },
                Spence: { stars: "★★★★☆", text: "REVIEW PENDING" },
                Brian:  { stars: "★★★☆☆", text: "If I could describe the game in one word: fine. The graphics are a highlight, but the combat, story, characters, and traversal are all just...fine. Not a bad game! Just fine." },
                Tim:    { stars: "★★★★★", text: "REVIEW PENDING" },
                Justin: { stars: "★★★★☆", text: "REVIEW PENDING" },
                Alex:   { stars: "★★★★☆", text: "A lovingly crafted and technically impressive world with streamlined mechanics that didn't overstay their welcome. While the writing had a younger audience in mind, it serviceably moved the action along while providing the warm and fuzzies of a 90s PBS show." }
            }
        },
        HiFiRush: {
            title: "Hi-Fi Rush",
            datePlayed: "June 2026, nominated by Brian",
            overallStars: "★★★★★",
            verdictText: "REVIEW PENDING",
            memberComments: {
                Scott:  { stars: "★★★★★", text: "REVIEW PENDING" },
                Jared:  { stars: "★★★★★", text: "REVIEW PENDING" },
                Spence: { stars: "★★★★☆", text: "REVIEW PENDING" },
                Brian:  { stars: "★★★★★", text: "REVIEW PENDING" },
                Tim:    { stars: "★★★★★", text: "REVIEW PENDING" },
                Justin: { stars: "★★★★★", text: "REVIEW PENDING" },
                Alex:   { stars: "★★★★★", text: "REVIEW PENDING" }
            }
        }
    };

    let currentActiveKey = null;

    function loadGameToTv(gameKey) {
        const data = clubReviews[gameKey];
        if(!data) return;

        currentActiveKey = gameKey;

        document.getElementById('tvScreenBox').classList.remove('static-active');
        document.getElementById('tvPlaceholder').style.display = 'none';
        document.getElementById('tvContentLayer').style.display = 'block';

        document.getElementById('tvGameTitle').innerText = data.title.toUpperCase();
        document.getElementById('tvGameDate').innerText = `PLAYED: ${data.datePlayed}`;

        switchTvTab('verdict');
    }

    function switchTvTab(tabName) {
        if (!currentActiveKey) return;
        const data = clubReviews[currentActiveKey];
        const terminal = document.getElementById('tvDisplayTerminal');
        
        terminal.innerHTML = ""; 

        if (tabName === 'verdict') {
            terminal.innerHTML = `
                <div class="verdict-stars">RATING: ${data.overallStars}</div>
                <p style="color: #fff; line-height: 1.4;">${data.verdictText}</p>
            `;
        } else if (tabName === 'logs') {
            const alphabetizedMembers = ["Alex", "Brian", "Jared", "Justin", "Scott", "Spence", "Tim"];
            
            alphabetizedMembers.forEach(name => {
                const log = data.memberComments[name] || { stars: "☆☆☆☆☆", text: "No entry logs loaded." };
                
                const reviewRow = document.createElement('div');
                reviewRow.className = "tv-member-review";
                reviewRow.innerHTML = `
                    <div class="tv-member-header">
                        <span>>${name}</span>
                        <span class="stars">${log.stars}</span>
                    </div>
                    <div style="color: #a4b0be; padding-left: 10px; margin-top: 2px;">"${log.text}"</div>
                `;
                terminal.appendChild(reviewRow);
            });
        }
    }
</script>

</body>
</html>
